{% extends "customer/layout.html" %}

{% block content %}
<div class="auth-page-container">
    <div class="auth-card">

        <!-- Header Branding Block -->
        <div class="auth-header">
            <h2>Reset Password</h2>
            <p>Enter your email address to receive a password reset link</p>
        </div>

        <!-- Forgot Password Form -->
        <form action="{{ url_for('forgot_password') }}" method="POST" class="auth-form">

            <div class="form-group-field">
                <label for="email">Email Address</label>
                <div class="input-icon-wrapper mt-1">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" 
                           id="email" 
                           name="email" 
                           placeholder="Enter registered email address" 
                           required>
                </div>
            </div>

            <button type="submit" class="btn-auth-action mt-2">Send Reset Link</button>
        </form>

        <!-- Back to login link -->
        <div class="auth-footer mt-4">
            <p>Remember your password? <a href="{{ url_for('login') }}" class="text-purple-400 hover:text-purple-300 font-semibold transition-colors">Log In</a></p>
        </div>

    </div>
</div>
{% endblock %}
