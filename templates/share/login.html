{% extends "customer/layout.html" %}

{% block content %}
<div class="auth-page-container">
    <div class="auth-card">

        <!-- Header Branding Block -->
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your YSTAA SHOPP account</p>
        </div>

        <!-- Core Authentication Form -->
        <form action="{{ url_for('login') }}" method="POST" class="auth-form">

            <div class="form-group-field">
                <label for="username">Username or Email</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           placeholder="Username or email address" 
                           required>
                </div>
            </div>

            <div class="form-group-field">
                <div class="label-row-split">
                    <label for="password">Password</label>
                    <a href="{{ url_for('forgot_password') }}" class="forgot-password-link">Forgot Password?</a>
                </div>
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           placeholder="Enter password" 
                           required>
                </div>
            </div>

            <!-- Keep me logged in -->
            <div class="form-checkbox-row">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Keep me logged in</label>
            </div>

            <button type="submit" class="btn-auth-action">Log In</button>
        </form>



        <!-- Redirection Link -->
        <div class="auth-footer-link">
            <p>New to YSTAA SHOPP? <a href="{{ url_for('register') }}">Create an account</a></p>
        </div>

    </div>
</div>
{% endblock %}
