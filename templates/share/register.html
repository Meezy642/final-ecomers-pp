{% extends "customer/layout.html" %}

{% block content %}
<div class="auth-page-container">
    <div class="auth-card">

        <!-- Header Branding Block -->
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join YSTAA SHOPP to save favorites and place orders</p>
        </div>

        <!-- Core Authentication Form -->
        <form action="{{ url_for('register') }}" method="POST" class="auth-form">

            <div class="form-group-field">
                <label for="username">Username</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           placeholder="Choose a unique username" 
                           required>
                </div>
            </div>

            <div class="form-group-field">
                <label for="email">Email Address</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" 
                           id="email" 
                           name="email" 
                           placeholder="name@example.com" 
                           required>
                </div>
            </div>

            <div class="form-group-field">
                <label for="password">Password</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           placeholder="Create a secure password" 
                           required>
                </div>
            </div>

            <div class="form-group-field">
                <label for="confirm_password">Confirm Password</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-shield-alt input-icon"></i>
                    <input type="password" 
                           id="confirm_password" 
                           name="confirm_password" 
                           placeholder="Repeat your password" 
                           required>
                </div>
            </div>

            <!-- Policy Compliance Checkbox -->
            <div class="form-checkbox-row font-medium">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a></label>
            </div>

            <button type="submit" class="btn-auth-action">Create Account</button>
        </form>

        <!-- Structural Redirection Footer -->
        <div class="auth-footer-link">
            <p>Already have an account? <a href="{{ url_for('login') }}">Log In here</a></p>
        </div>

    </div>
</div>
{% endblock %}
