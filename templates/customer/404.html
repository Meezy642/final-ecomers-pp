{% extends "customer/layout.html" %}

{% block content %}
<div class="max-w-md mx-auto text-center py-20 px-4 space-y-6 flex flex-col items-center justify-center min-h-[70vh]">
    <div class="w-24 h-24 rounded-full bg-purple-950/40 border border-purple-500/20 text-purple-400 text-4xl mb-4 flex items-center justify-center shadow-lg shadow-purple-500/15">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    
    <h1 class="text-7xl font-black tracking-tight font-heading text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-400">404</h1>
    <h2 class="text-xl font-bold text-white font-heading">Product or Page Not Found</h2>
    <p class="text-slate-400 text-sm leading-relaxed max-w-sm">
        Oops! The product page you are looking for has either been moved, deleted, or never existed in our catalog database.
    </p>
    
    <div class="pt-4 w-full">
        <a href="{{ url_for('products') }}" class="btn-primary w-full py-4 text-white font-bold cursor-pointer flex items-center justify-center gap-2 rounded-xl">
            <i class="fas fa-shopping-bag text-sm"></i> Return to Shopping Catalog
        </a>
    </div>
    <a href="{{ url_for('home') }}" class="text-xs font-semibold text-slate-400 hover:text-purple-400 transition-colors cursor-pointer">
        Go Back to Homepage
    </a>
</div>
{% endblock %}
