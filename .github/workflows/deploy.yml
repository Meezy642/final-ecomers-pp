name: Deploy Python Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Executing remote ssh commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "🌐 Connected to Ubuntu Server"
          cd /home/ubuntu/python-final-ecomerce
          
          echo "🔗 Setting remote origin to your new repository..."
          git remote set-url origin https://github.com/Meezy642/final-ecomers-pp.git || true
          
          echo "📥 Pulling latest code changes..."
          git pull origin main
          
          echo "🔄 Restarting Gunicorn (flaskapp)..."
          sudo systemctl restart flaskapp
          
          echo "🚀 Deployment completely finished!"
